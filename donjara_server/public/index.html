<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ドンジャラ オンライン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>

:root{
  --felt:#1a5c38;--felt-d:#134a2d;--felt-l:#1e6b42;--felt-ln:#237a4b;
  --gold:#c9a84c;--gold-d:#8a7030;
  --ivory:#faf6ee;--tb:#c8b88a;--ts:rgba(0,0,0,.55);
  --ui-bg:#0f1a0f;--ui-sf:#162416;--ui-sf2:#1e2e1e;
  --ui-br:#2a4a2a;--ui-tx:#c8d8c0;--ui-tx2:#7a9a7a;
  --red:#cc3333;--grn:#2a8a4a;--blu:#2a6aaa;--pur:#6a3a9a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ui-bg);color:var(--ui-tx);font-family:'Noto Sans JP',sans-serif;}
body{display:flex;flex-direction:column;}

/* タイトル */
#scTitle{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:radial-gradient(ellipse at 50% 40%,#1a4a28,#0a1208);}
.t-deco{font-size:3rem;margin-bottom:4px;animation:fl 3s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.t-logo{font-family:'Noto Serif JP',serif;font-size:2.3rem;font-weight:900;color:var(--gold);text-shadow:0 2px 0 #8a6020,0 0 40px #c9a84c55;letter-spacing:6px;margin-bottom:4px;}
.t-sub{font-size:.7rem;color:var(--ui-tx2);letter-spacing:4px;margin-bottom:32px;}
.setup{background:var(--ui-sf);border:1px solid var(--ui-br);border-radius:16px;padding:26px 30px;width:320px;display:flex;flex-direction:column;gap:18px;box-shadow:0 8px 40px rgba(0,0,0,.6);}
.f-lbl{font-size:.7rem;color:var(--ui-tx2);margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;}
.pc-row{display:flex;gap:8px;}
.pc-btn{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--ui-br);background:transparent;color:var(--ui-tx);font-size:1rem;font-family:inherit;cursor:pointer;transition:all .15s;}
.pc-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1);}
.ni{display:flex;flex-direction:column;gap:6px;}
.n-inp{padding:9px 12px;border-radius:7px;border:1px solid var(--ui-br);background:rgba(255,255,255,.04);color:var(--ui-tx);font-size:.88rem;font-family:inherit;outline:none;transition:border .15s;}
.n-inp:focus{border-color:var(--gold);}
.s-btn{padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#c9a84c,#a07830);color:#1a0f00;font-size:1rem;font-weight:700;font-family:'Noto Serif JP',serif;letter-spacing:2px;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(201,168,76,.3);}
.s-btn:hover{opacity:.9;transform:translateY(-1px);}
.cust-lnk{text-align:center;font-size:.72rem;color:var(--ui-tx2);}
.cust-lnk a{color:var(--gold);text-decoration:none;}

/* ゲーム */
#scGame{display:none;flex-direction:column;width:100%;height:100%;}
.g-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:var(--ui-sf);border-bottom:1px solid var(--ui-br);flex-shrink:0;height:38px;gap:8px;}
.g-ttl{font-family:'Noto Serif JP',serif;font-size:.88rem;font-weight:700;color:var(--gold);}
.g-info{font-size:.75rem;color:var(--ui-tx);}
.g-deck{font-size:.72rem;color:var(--ui-tx2);}
.msgbar{text-align:center;padding:4px 12px;background:rgba(0,0,0,.4);font-size:.78rem;color:var(--ui-tx2);flex-shrink:0;min-height:26px;border-bottom:1px solid var(--ui-br);}
.msgbar.hl{color:var(--gold);font-weight:700;}

/* 卓 */
.table-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:4px;min-height:0;}
.felt{
  position:relative;
  width:min(98vw, calc(100vh - 230px), 800px);
  aspect-ratio:1/1;
  background:radial-gradient(ellipse at 50% 50%,var(--felt-l),var(--felt) 55%,var(--felt-d));
  border-radius:20px;border:5px solid #2a1a08;
  box-shadow:inset 0 0 50px rgba(0,0,0,.4),0 8px 40px rgba(0,0,0,.8);
  display:grid;
  grid-template-columns:15% 10% 1fr 10% 15%;
  grid-template-rows:15% 10% 1fr 10% 15%;
  grid-template-areas:
    "top-l     top-l     top       top-r     top-r"
    "opp-left  .         river-top .         opp-right"
    "opp-left  river-left center   river-right opp-right"
    "opp-left  .         river-bot .         opp-right"
    "bot-l     bot-l     bot       bot-r     bot-r";
}
.felt::before{content:'';position:absolute;inset:0;border-radius:15px;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px),
  repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);pointer-events:none;}
.felt::after{content:'';position:absolute;inset:14px;border-radius:10px;border:1.5px solid var(--felt-ln);pointer-events:none;opacity:.4;}

/* 河 */
/* 各河エリアはgrid-areaで位置決め、牌を横並びで積む */
.river-top{
  grid-area:river-top;
  display:flex;flex-wrap:nowrap;gap:2px;
  align-items:center;justify-content:center;
  transform:rotate(180deg);
  overflow:visible;
}
.river-right{
  grid-area:river-right;
  display:flex;flex-wrap:nowrap;gap:2px;
  align-items:center;justify-content:flex-start;
  /* 右P視点 -90度：牌の上端が右辺に近い方 */
  transform:rotate(-90deg);
  transform-origin:center center;
  overflow:visible;
}
.river-left{
  grid-area:river-left;
  display:flex;flex-wrap:nowrap;gap:2px;
  align-items:center;justify-content:flex-start;
  /* 左P視点 90度 */
  transform:rotate(90deg);
  transform-origin:center center;
  overflow:visible;
}
/* centerエリアをrelativeにして左右河の絶対配置の基点にする */
.river-bot{
  grid-area:river-bot;
  display:flex;flex-wrap:nowrap;gap:2px;
  align-items:center;justify-content:center;
  overflow:visible;
}
/* 自分の鳴き牌エリア：卓の下端、右寄せ */
.meld-bot{
  grid-area:meld-bot;
  display:flex;flex-wrap:wrap;gap:4px;
  align-items:center;justify-content:flex-end;
  padding:2px 8px 4px;
}
.meld-bot .meld-grp-opp{
  display:flex;flex-direction:column;align-items:center;gap:1px;
}
.meld-bot .meld-grp-opp .meld-type-lbl{
  font-size:.5rem;color:rgba(255,255,255,.5);text-align:center;
}
.center-area{
  grid-area:center;
  position:relative; /* 左右河の絶対配置基点 */
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
}

/* 相手 */
.opp{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px;}
.opp.top{grid-area:top;flex-direction:column-reverse;}
.opp.left-slot{
  grid-area:opp-left;
  flex-direction:row;
  align-items:center;justify-content:center;
}
.opp.right-slot{
  grid-area:opp-right;
  flex-direction:row-reverse;
  align-items:center;justify-content:center;
}
/* 捨て牌サイズ：正方形卓に合わせて微調整 */
.dc,.mt{width:26px;height:36px;}
.pbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.55);border-radius:5px;padding:2px 9px;font-size:.65rem;border:1px solid rgba(201,168,76,.15);white-space:nowrap;}
.pbadge.act{border-color:var(--gold);color:var(--gold);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ui-tx2);flex-shrink:0;}
.pbadge.act .dot{background:var(--gold);box-shadow:0 0 5px var(--gold);animation:bk 1s infinite;}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.brow{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.brow.vert{flex-direction:column;}
.tback{background:linear-gradient(135deg,#2a4a8a,#1a2a5a,#0f1a3a);border:1px solid #3a5aaa;border-bottom:2px solid #0a1030;border-radius:3px;box-shadow:1px 2px 4px rgba(0,0,0,.6);flex-shrink:0;position:relative;}
.tback::after{content:'';position:absolute;inset:1px;border:1px solid rgba(255,255,255,.07);border-radius:2px;}
.meldrow{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
.meldg{display:flex;gap:1px;padding:2px 3px;background:rgba(201,168,76,.08);border-radius:3px;border:1px solid rgba(201,168,76,.15);}

/* 牌 */
.tf{
  background:linear-gradient(160deg,#fff 0%,var(--ivory) 100%);
  border:1.5px solid var(--tb);border-bottom:3px solid #a09060;border-right:2px solid #b8a870;
  border-radius:3px;box-shadow:2px 3px 5px var(--ts);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#1a1208;position:relative;flex-shrink:0;font-family:'Noto Sans JP',sans-serif;
  transition:transform .1s,box-shadow .1s,border-color .1s;overflow:hidden;
}
.tf.click{cursor:pointer;}
.tf.click:hover{transform:translateY(-5px);box-shadow:2px 7px 14px var(--ts);}
.tf.sel{transform:translateY(-14px)!important;box-shadow:0 14px 24px rgba(201,168,76,.55)!important;border-color:var(--gold)!important;}
.tf.drawn{border-color:#44cc66!important;box-shadow:0 0 10px rgba(60,200,80,.6)!important;}
.tf.lastd{border-color:#dd4444!important;box-shadow:0 0 8px rgba(200,60,60,.7)!important;}
.lg{width:68px;height:96px;}.md{width:46px;height:64px;}.sm{width:36px;height:50px;}.xs{width:24px;height:34px;}.dc,.mt{width:28px;height:38px;}
.dc .t-lbl,.mt .t-lbl{display:none;}
.dc .t-img,.mt .t-img{height:100%;border-radius:2px;}
.dc .t-icon,.mt .t-icon{font-size:.9em;}
.t-img{width:100%;height:75%;object-fit:cover;display:block;flex-shrink:0;}
.t-lbl{font-size:.5rem;padding:1px 3px;text-align:center;word-break:break-all;line-height:1.2;color:#1a1208;}
.t-icon{font-size:1.1em;line-height:1;color:#1a1208;}
.t-seq{position:absolute;top:1px;right:2px;font-size:.46em;color:#aa9060;opacity:.7;}

/* 自分手牌 */
.myarea{flex-shrink:0;background:linear-gradient(0deg,#0a1208,#111e12);border-top:2px solid var(--ui-br);padding:8px 16px 12px;}
.mytop{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px;}
.myname{font-family:'Noto Serif JP',serif;font-size:.8rem;color:var(--gold);font-weight:700;}
.actrow{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.abtn{padding:10px 20px;border-radius:8px;border:none;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .12s;white-space:nowrap;}
.abtn:not(:disabled):hover{filter:brightness(1.15);transform:translateY(-1px);}
.abtn.primary{background:linear-gradient(135deg,var(--gold),#a07830);color:#1a0f00;}
.abtn.red{background:linear-gradient(135deg,#cc3333,#882020);color:#fff;}
.abtn.purple{background:linear-gradient(135deg,#7a3aaa,#4a1a7a);color:#fff;}
.abtn.blue{background:linear-gradient(135deg,#2a6aaa,#0a3a7a);color:#fff;}
.abtn.green{background:linear-gradient(135deg,#2a8a4a,#0a5a2a);color:#fff;}
.abtn.neutral{background:rgba(255,255,255,.07);color:var(--ui-tx);border:1px solid var(--ui-br);}
.hint{font-size:.7rem;color:var(--ui-tx2);}
.mymelds{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;min-height:0;}
.handrow{display:flex;flex-direction:row;gap:4px;align-items:flex-end;overflow-x:auto;padding:4px 0 6px;}
.hand-group-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.hand-group-wrap .tiles-row{display:flex;flex-direction:row;gap:3px;align-items:flex-end;}
.group-label{font-size:.56rem;padding:1px 5px;border-radius:3px;font-weight:700;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.group-label.match{background:rgba(40,160,80,.25);color:#7fcc7f;border:1px solid rgba(40,160,80,.4);}
.group-label.nomatch{background:rgba(180,40,40,.2);color:#ee8888;border:1px solid rgba(180,40,40,.3);}
.hand-group-wrap.match-group .tiles-row .tf{border-color:rgba(40,160,80,.6)!important;}
.hand-group-wrap.nomatch-group .tiles-row .tf{border-color:rgba(180,40,40,.5)!important;}
.div-slot{width:10px;min-width:10px;height:92px;display:flex;align-items:center;justify-content:center;cursor:col-resize;flex-shrink:0;}
.div-slot:hover .divider-hint{opacity:1;}
.divider-hint{width:3px;height:60%;background:rgba(255,255,255,.15);border-radius:2px;opacity:0;transition:opacity .15s;}
.divider-active{width:3px;height:80%;background:var(--gold);border-radius:2px;box-shadow:0 0 6px rgba(201,168,76,.5);}
.handrow::-webkit-scrollbar{height:3px;}
.handrow::-webkit-scrollbar-thumb{background:var(--ui-br);}
.drawn-sep{width:10px;flex-shrink:0;}
.tf.dragging{opacity:.3;border-color:var(--gold)!important;cursor:grabbing!important;}
.drop-indicator{width:4px;min-width:4px;height:92px;background:var(--gold);border-radius:2px;flex-shrink:0;animation:indic .5s ease-in-out infinite alternate;}
@keyframes indic{from{opacity:.3}to{opacity:1}}
.tf.click{cursor:grab;}.tf.click:active{cursor:grabbing;}

/* モーダル */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.ov.open{display:flex;}
.modal{background:var(--ui-sf);border:1px solid var(--ui-br);border-radius:14px;padding:22px 26px;max-width:440px;width:92%;box-shadow:0 16px 60px rgba(0,0,0,.8);}
.modal h3{font-family:'Noto Serif JP',serif;color:var(--gold);margin-bottom:14px;font-size:.95rem;}
.mtiles{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
.mfoot{display:flex;gap:8px;justify-content:flex-end;}

/* 上がり */
.win-inner{background:linear-gradient(160deg,#1a2a14,#0a1208);border:2px solid var(--gold);border-radius:20px;padding:28px 32px;text-align:center;max-width:600px;width:96%;box-shadow:0 0 60px rgba(201,168,76,.25),0 16px 60px rgba(0,0,0,.8);animation:pop .4s cubic-bezier(.175,.885,.32,1.275);max-height:92vh;overflow-y:auto;}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.win-em{font-size:2.6rem;margin-bottom:6px;}
.win-ttl{font-family:'Noto Serif JP',serif;font-size:2rem;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,.5);margin-bottom:4px;}
.win-pl{font-size:1.05rem;font-weight:700;margin-bottom:3px;}
.win-tp{font-size:.82rem;color:var(--ui-tx2);margin-bottom:16px;}
.win-sec{margin-bottom:14px;}
.win-sec-ttl{font-size:.7rem;color:var(--ui-tx2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;text-align:left;border-bottom:1px solid var(--ui-br);padding-bottom:3px;}
.hand-groups{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.hand-group{display:flex;flex-direction:column;align-items:center;gap:3px;}
.hg-lbl{font-size:.58rem;color:var(--ui-tx2);}
.hg-tiles{display:flex;gap:3px;padding:4px 6px;border-radius:5px;}
.hg-pair{background:rgba(80,120,200,.15);border:1px solid rgba(80,120,200,.3);}
.hg-kou{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);}
.hg-chi{background:rgba(60,160,80,.15);border:1px solid rgba(60,160,80,.3);}
.win-melds{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.win-meldg{display:flex;gap:3px;padding:4px 6px;background:rgba(201,168,76,.08);border-radius:5px;border:1px solid rgba(201,168,76,.2);}
.win-btn{padding:11px 32px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--gold),#a07830);color:#1a0f00;font-size:.95rem;font-weight:700;font-family:'Noto Serif JP',serif;letter-spacing:2px;cursor:pointer;margin-top:8px;}
.win-btn:hover{filter:brightness(1.1);}

#scLobby{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:radial-gradient(ellipse at 50% 40%,#1a4a28,#0a1208);}
.lobby-box{background:var(--ui-sf);border:1px solid var(--ui-br);border-radius:16px;padding:28px 32px;width:340px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,.6);}
.lobby-title{font-family:"Noto Serif JP",serif;font-size:1.5rem;font-weight:900;color:var(--gold);text-align:center;}
.lobby-sub{font-size:.75rem;color:var(--ui-tx2);text-align:center;letter-spacing:3px;margin-top:-8px;}
.lobby-input{padding:10px 14px;border-radius:8px;border:1px solid var(--ui-br);background:rgba(255,255,255,.05);color:var(--ui-tx);font-size:.9rem;font-family:inherit;outline:none;}
.lobby-input:focus{border-color:var(--gold);}
.lobby-btn{padding:12px;border-radius:10px;border:none;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;}
.lobby-btn.primary{background:linear-gradient(135deg,var(--gold),#a07830);color:#1a0f00;}
.lobby-btn.secondary{background:var(--ui-sf2);color:var(--ui-tx);border:1px solid var(--ui-br);}
.lobby-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.lobby-sep{display:flex;align-items:center;gap:10px;color:var(--ui-tx2);font-size:.75rem;}
.lobby-sep::before,.lobby-sep::after{content:"";flex:1;height:1px;background:var(--ui-br);}
.room-id-display{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:10px;text-align:center;}
.room-id-val{font-family:monospace;font-size:1.4rem;font-weight:700;color:var(--gold);letter-spacing:6px;}
.room-id-hint{font-size:.7rem;color:var(--ui-tx2);margin-top:4px;}
.player-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ui-sf2);border-radius:8px;font-size:.85rem;}
.player-item .dot{width:8px;height:8px;border-radius:50%;background:var(--grn);}
.player-item.host .dot{background:var(--gold);}
.error-msg{color:#ee6666;font-size:.78rem;text-align:center;min-height:18px;}
.npc-btn{padding:6px 10px;border-radius:7px;border:1px solid var(--ui-br);background:var(--ui-sf2);color:var(--ui-tx2);font-size:.78rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .12s;}
.npc-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1);}
.npc-btn:hover{filter:brightness(1.1);}
</style>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="scLobby">
  <div class="lobby-box" id="lobbyBox">
    <div class="lobby-title">🀄 ドンジャラ</div>
    <div class="lobby-sub">ONLINE</div>
    <input class="lobby-input" id="nameInput" placeholder="ニックネームを入力" maxlength="12">
    <div class="error-msg" id="errorMsg"></div>
    <button class="lobby-btn primary" onclick="createRoom()">ルームを作成</button>
    <div class="lobby-sep">または</div>
    <input class="lobby-input" id="roomInput" placeholder="ルームID（5文字）" maxlength="5" style="text-transform:uppercase;text-align:center;letter-spacing:4px;">
    <button class="lobby-btn secondary" onclick="joinRoom()">ルームに参加</button>
  </div>
  <div class="lobby-box" id="waitingBox" style="display:none;">
    <div class="lobby-title">待機中...</div>
    <div class="room-id-display">
      <div class="room-id-val" id="roomIdDisplay">-----</div>
      <div class="room-id-hint">このIDを参加者に共有してください</div>
    </div>
    <div id="playerList"></div>
    <div id="waitingHint" style="font-size:.75rem;color:var(--ui-tx2);text-align:center;">2〜4人揃ったらゲーム開始できます</div>
    <div id="npcSelect" style="display:none;flex-direction:column;gap:8px;">
      <div style="font-size:.75rem;color:var(--ui-tx2);text-align:center;">NPCを追加</div>
      <div style="display:flex;gap:6px;justify-content:center;">
        <button class="npc-btn on" data-n="0">0人</button>
        <button class="npc-btn" data-n="1">1人</button>
        <button class="npc-btn" data-n="2">2人</button>
        <button class="npc-btn" data-n="3">3人</button>
      </div>
    </div>
    <button class="lobby-btn primary" id="startBtn" onclick="startGame()" style="display:none;">ゲーム開始</button>
    <div class="error-msg" id="waitErrorMsg"></div>
  </div>
</div>

<script>
const socket=io();
socket.on('connect',()=>{myPlayerId=socket.id;});
socket.on('room_update',(info)=>{
  if(!info)return;
  document.getElementById('playerList').innerHTML=info.players.map((p,i)=>
    `<div class="player-item${i===0?' host':''}"><span class="dot"></span><span>${p.name}${i===0?' 👑':''}</span></div>`
  ).join('');
  const hc=info.players.length;
  if(isHost){
    document.getElementById('npcSelect').style.display='flex';
    document.getElementById('startBtn').style.display='';
    document.getElementById('waitingHint').textContent=hc+'人参加中（NPC追加でゲーム開始可）';
  } else {
    document.getElementById('npcSelect').style.display='none';
    document.getElementById('startBtn').style.display='none';
    document.getElementById('waitingHint').textContent=hc+'人参加中。ホストがゲームを開始するまで待機してください。';
  }
});
socket.on('game_state',(state)=>{
  if(!state)return;
  // game_state受信時はnakiOptionsをリセット（サーバーが正）
  if(G&&G.nakiOptions&&state.phase!=='naki_wait') state.nakiOptions=null;
  G=state;
  if(document.getElementById('scLobby').style.display!=='none'){
    document.getElementById('scLobby').style.display='none';
    document.getElementById('scGame').style.display='flex';
  }
  render();
});
socket.on('naki_available',({disc,options})=>{if(!G)return;const myOpts=options[myPlayerId];if(myOpts&&myOpts.length>0){G.nakiOptions=myOpts;G.nakiDisc=disc;G.phase='naki_wait';render();msg('「'+(TMAP[disc]?.name||'?')+'」が捨てられました',true);}});
socket.on('game_over',(data)=>{document.getElementById('winPl').textContent=data.winnerName;document.getElementById('winTp').textContent=data.type+' で上がり！';const grps=calcGroups(data.hand||[]);document.getElementById('winGroups').innerHTML=grps.map(g=>`<div class="hand-group"><div class="hg-lbl">${g.setName||'？'}</div><div class="hg-tiles ${g.match?'hg-kou':'hg-chi'}">${g.ids.map(id=>tf(id,'sm')).join('')}</div></div>`).join('');const ms=document.getElementById('winMeldSec');if(data.melds&&data.melds.length>0){document.getElementById('winMelds').innerHTML=data.melds.map(m=>`<div class="win-meldg"><span style="font-size:.58rem;color:var(--ui-tx2);margin-right:3px;">${m.type}</span>${m.tiles.map(id=>tf(id,'sm')).join('')}</div>`).join('');ms.style.display='';}else{ms.style.display='none';}document.getElementById('winOv').classList.add('open');});
socket.on('ryukyoku',({message})=>{msg(message+'！',true);});
socket.on('player_left',({name})=>{msg(name+' が退出しました',true);});

const SKEY='donjara_tiles_v1',SSETS_KEY='donjara_sets_v1';
let TMAP={},ALL_TILES=[],ALL_SETS=[];
let G=null,myPlayerId=null,myRoomId=null,isHost=false;
let _nType='',_nTiles=[];
async function loadTilesFromServer(){
  try{
    const r=await fetch('/tiles-meta');
    const d=await r.json();
    ALL_TILES=d.tiles.map(t=>({...t,image:IMG_MAP[String(t.id)]||null}));
    ALL_SETS=d.sets||[];TMAP={};ALL_TILES.forEach(t=>{TMAP[t.id]=t;});
  }catch(e){console.error(e);}
}
loadTilesFromServer();
function getName(){const n=document.getElementById('nameInput').value.trim();if(!n){document.getElementById('errorMsg').textContent='ニックネームを入力してください';return null;}return n;}
function createRoom(){
  const name=getName();if(!name)return;
  socket.emit('create_room',{name},(res)=>{
    if(!res.ok){document.getElementById('errorMsg').textContent=res.error||'エラー';return;}
    myRoomId=res.roomId;isHost=true;
    showWaiting(res.roomId);
    // room_update待ちせず直接ホスト用UIを表示
    document.getElementById('npcSelect').style.display='flex';
    document.getElementById('startBtn').style.display='';
    document.getElementById('waitingHint').textContent='1人参加中（NPCを追加してゲーム開始）';
  });
}
function joinRoom(){const name=getName();if(!name)return;const roomId=document.getElementById('roomInput').value.trim().toUpperCase();if(roomId.length!==5){document.getElementById('errorMsg').textContent='ルームIDは5文字です';return;}socket.emit('join_room',{roomId,name},(res)=>{if(!res.ok){document.getElementById('errorMsg').textContent=res.error||'エラー';return;}myRoomId=res.roomId;isHost=res.playerIdx===0;showWaiting(res.roomId);});}
function showWaiting(roomId){document.getElementById('lobbyBox').style.display='none';document.getElementById('waitingBox').style.display='';document.getElementById('roomIdDisplay').textContent=roomId;}
function setNpc(n,btn){npcCount=n;document.querySelectorAll('.npc-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function startGame(){socket.emit('start_game',{npcCount},(res)=>{if(!res||!res.ok)document.getElementById('waitErrorMsg').textContent=res?.error||'エラー';});
window.setNpc=setNpc;window.startGame=startGame;window.createRoom=createRoom;window.joinRoom=joinRoom;window.closeNaki=closeNaki;window.confirmNaki=confirmNaki;window.backToLobby=backToLobby;}
function backToLobby(){document.getElementById('winOv').classList.remove('open');document.getElementById('scGame').style.display='none';document.getElementById('scLobby').style.display='flex';document.getElementById('waitingBox').style.display='none';document.getElementById('lobbyBox').style.display='';G=null;dividers.clear();}
function discardTile(id,idx){if(!G||G.phase!=='discard')return;if(!G.players[G.cur]||G.players[G.cur].id!==myPlayerId)return;socket.emit('discard',{tileId:id,handIdx:idx});dividers.clear();}
function doTsumoWin(){socket.emit('win_declare',{type:'ツモ',ronTile:null});}
function doRon(){if(!G||!G.nakiDisc)return;socket.emit('win_declare',{type:'ロン',ronTile:G.nakiDisc});}
function doSkip(){socket.emit('skip',{});G.nakiOptions=null;render();}
function openNaki(type,tiles){_nType=type;_nTiles=tiles;document.getElementById('nakiHead').textContent=type+' する牌';document.getElementById('nakiTiles').innerHTML=tiles.map(id=>tf(id,'sm')).join('');document.getElementById('nakiOv').classList.add('open');}
function closeNaki(){document.getElementById('nakiOv').classList.remove('open');}
function confirmNaki(){closeNaki();socket.emit('naki',{type:_nType,tiles:[..._nTiles]});}
function doPon(){const me=G.players[G.myIdx];openNaki('ポン',[G.nakiDisc,...me.hand.filter(id=>id===G.nakiDisc).slice(0,2)]);}
function doChi(){const me=G.players[G.myIdx];const c=chiCombos(me.hand,G.nakiDisc);if(!c.length)return;openNaki('チー',[G.nakiDisc,...c[0]]);}

// ============================================================
//  上がり判定（14枚使い切り方式）
//  コウツ（同じ牌3枚）常に有効 + ALL_SETS登録セット有効
// ============================================================

// 手牌からsetTilesを取り除く。成功→残り手牌、失敗→null
function matchSet(hand, setTiles) {
  const h = [...hand];
  for(const id of setTiles){
    const i = h.indexOf(id);
    if(i === -1) return null;
    h.splice(i, 1);
  }
  return h;
}

// 手牌をセットで使い切れるか再帰チェック
function canUseAll(hand) {
  if(hand.length === 0) return true;
  const s = [...hand].sort((a,b)=>a-b);
  // コウツ（同じ牌3枚）
  if(s.length >= 3 && s[0]===s[1] && s[1]===s[2]){
    if(canUseAll(s.slice(3))) return true;
  }
  // 登録セット（任意枚数）
  for(const set of ALL_SETS){
    const rem = matchSet(s, set.tiles);
    if(rem !== null && rem.length < s.length){
      if(canUseAll(rem)) return true;
    }
  }
  return false;
}

// 上がり判定
function isWin(hand) {
  if(!hand || hand.length === 0) return false;
  return canUseAll([...hand]);
}

// 上がり形の解析（表示用）
function extractSets(hand) {
  if(hand.length === 0) return [];
  const s = [...hand].sort((a,b)=>a-b);
  // コウツ
  if(s.length >= 3 && s[0]===s[1] && s[1]===s[2]){
    const r = extractSets(s.slice(3));
    if(r !== null) return [{type:'コウツ', tiles:[s[0],s[1],s[2]]}, ...r];
  }
  // 登録セット
  for(const set of ALL_SETS){
    const rem = matchSet(s, set.tiles);
    if(rem !== null && rem.length < s.length){
      const r = extractSets(rem);
      if(r !== null) return [{type:set.name, tiles:[...set.tiles]}, ...r];
    }
  }
  return null;
}

function analyzeWin(hand) {
  const sets = extractSets([...hand]);
  return sets ? { sets } : null;
}

// ポン判定
function canPon(hand, id){ return hand.filter(x=>x===id).length >= 2; }

// チー判定: 捨て牌idを含む登録セットが手牌で完成するか
function canChi(hand, id) {
  return ALL_SETS.some(set => {
    if(set.tiles.length < 3) return false; // 3枚以上のセットのみチー可能
    if(!set.tiles.includes(id)) return false;
    const need = [...set.tiles];
    need.splice(need.indexOf(id), 1);
    const h = [...hand];
    for(const nid of need){
      const i = h.indexOf(nid); if(i===-1) return false;
      h.splice(i,1);
    }
    return true;
  });
}

// チーの組み合わせ一覧（確定用）
function chiCombos(hand, id) {
  const res = [];
  for(const set of ALL_SETS){
    if(set.tiles.length < 3) continue; // 3枚以上のみ
    if(!set.tiles.includes(id)) continue;
    const need = [...set.tiles];
    need.splice(need.indexOf(id), 1);
    const h = [...hand]; const picked = []; let ok = true;
    for(const nid of need){
      const i = h.indexOf(nid); if(i===-1){ok=false;break;}
      picked.push(h[i]); h.splice(i,1);
    }
    if(ok) res.push(picked);
  }
  return res;
}

// カン判定
function canMinkan(hand,id){ return hand.filter(x=>x===id).length>=3; }
function canAnkan(hand){ return ALL_TILES.filter(t=>hand.filter(x=>x===t.id).length>=4).map(t=>t.id); }
function canKakan(melds,hand){ return melds.filter(m=>m.type==='ポン').map(m=>m.tiles[0]).filter(id=>hand.includes(id)); }

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ドラッグ状態
// mode: null=未確定, 'sort'=左右並び替え, 'discard'=上方向捨て
let drag={active:false,srcIdx:-1,tile:null,indicator:null,startX:0,startY:0,mode:null};
let dividers=new Set();
const DRAG_THRESHOLD=8;   // px: この距離動いたら方向確定
const DISCARD_UP=40;      // px: この距離上に動いたら捨て牌モード

function onTileMouseDown(e){
  e.preventDefault();
  const tile=e.currentTarget;
  const idx=parseInt(tile.dataset.handIdx);
  if(isNaN(idx)) return;
  drag={active:true,srcIdx:idx,tile:tile,indicator:null,
        startX:e.clientX,startY:e.clientY,mode:null};
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragUp);
}

function getDropIdx(clientX){
  const tiles=[...document.getElementById('myHand').querySelectorAll('.tf[data-hand-idx]')];
  for(let i=0;i<tiles.length;i++){
    const r=tiles[i].getBoundingClientRect();
    if(clientX<r.left+r.width/2) return i;
  }
  return tiles.length;
}

function onDragMove(e){
  if(!drag.active) return;
  const dx=e.clientX-drag.startX;
  const dy=e.clientY-drag.startY; // 上=マイナス

  // 方向未確定の間は閾値待ち
  if(!drag.mode){
    if(Math.abs(dx)<DRAG_THRESHOLD && Math.abs(dy)<DRAG_THRESHOLD) return;
    // 上方向が優先
    if(dy<-DRAG_THRESHOLD){
      drag.mode='discard';
    } else {
      drag.mode='sort';
    }
  }

  if(drag.mode==='discard'){
    // 上ドラッグ: 牌を浮かせて視覚フィードバック
    if(drag.indicator){drag.indicator.remove();drag.indicator=null;}
    const lift=Math.min(Math.max(-dy,0),60);
    drag.tile.style.transform=`translateY(-${lift}px)`;
    drag.tile.style.borderColor=lift>DISCARD_UP?'var(--red)':'var(--gold)';
    drag.tile.style.boxShadow=lift>DISCARD_UP?'0 8px 20px rgba(200,60,60,.6)':'0 8px 20px rgba(201,168,76,.4)';
  } else {
    // 左右ドラッグ: 並び替えインジケーター
    drag.tile.classList.add('dragging');
    const handEl=document.getElementById('myHand');
    if(drag.indicator) drag.indicator.remove();
    const dst=getDropIdx(e.clientX);
    const tiles=[...handEl.querySelectorAll('.tf[data-hand-idx]')];
    const ind=document.createElement('div');
    ind.className='drop-indicator';
    drag.indicator=ind;
    // tileはgroup-wrap内にあるのでhandElの直接の子ではない
    // handElの直接の子（group-wrap）に対してinsertBeforeする
    if(dst>=tiles.length){
      handEl.appendChild(ind);
    } else {
      const targetTile=tiles[dst];
      const targetParent=targetTile?.closest('.hand-group-wrap')||targetTile?.parentElement;
      if(targetParent&&targetParent.parentElement===handEl){
        handEl.insertBefore(ind,targetParent);
      } else {
        handEl.appendChild(ind);
      }
    }
  }
}

function onDragUp(e){
  if(!drag.active) return;
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragUp);

  const dy=e.clientY-drag.startY;

  if(drag.mode==='discard'){
    // 十分上に動いていたら捨て牌
    if(dy<-DISCARD_UP && G.phase==='discard' && G.players[G.cur]?.id===myPlayerId){
      const src=drag.srcIdx;
      const id=G.players[G.myIdx].hand[src];
      // スタイルリセット
      if(drag.tile){
        drag.tile.style.transform='';
        drag.tile.style.borderColor='';
        drag.tile.style.boxShadow='';
      }
      drag={active:false,srcIdx:-1,tile:null,indicator:null,startX:0,startY:0,mode:null};
      discardTile(id,src);
      return;
    }
    // キャンセル: スタイルを戻す
    if(drag.tile){
      drag.tile.style.transform='';
      drag.tile.style.borderColor='';
      drag.tile.style.boxShadow='';
    }
  } else if(drag.mode==='sort'){
    // 並び替え確定
    const src=drag.srcIdx;
    let dst=getDropIdx(e.clientX);
    if(dst>src) dst--;
    const hand=G.players[G.myIdx].hand;
    if(src!==dst && dst>=0 && dst<=hand.length-1){
      const [moved]=hand.splice(src,1);
      hand.splice(dst,0,moved);
      G.drawn=null;
    }
  }
  // mode===null: ほぼ動かなかった = クリック扱い → 捨て牌
  if(!drag.mode){
    const src=drag.srcIdx;
    const id=G.players[G.myIdx].hand[src];
    if(G.phase==='discard'&&G.players[G.cur]?.id===myPlayerId){
      drag={active:false,srcIdx:-1,tile:null,indicator:null,startX:0,startY:0,mode:null};
      discardTile(id,src);
      return;
    }
  }

  if(drag.indicator) drag.indicator.remove();
  if(drag.tile) drag.tile.classList.remove('dragging');
  drag={active:false,srcIdx:-1,tile:null,indicator:null,startX:0,startY:0,mode:null};
  render();
}


// ============================================================
//  グループ計算・セット照合
// ============================================================
function calcGroups(hand){
  const bounds=[0];
  for(let i=0;i<hand.length-1;i++) if(dividers.has(i)) bounds.push(i+1);
  bounds.push(hand.length);
  return bounds.slice(0,-1).map((s,bi)=>{
    const e=bounds[bi+1]-1;
    const ids=hand.slice(s,e+1);
    const name=findMatchingSet(ids);
    return {start:s,end:e,ids,match:name!==null,setName:name};
  });
}
function findMatchingSet(ids){
  if(!ids.length) return null;
  // コウツ（同じ牌3枚）
  if(ids.length===3&&ids[0]===ids[1]&&ids[1]===ids[2]) return 'コウツ';
  // 対子（同じ牌2枚）→役なし・2枚セットとして有効
  if(ids.length===2&&ids[0]===ids[1]) return '対子';
  // 登録セット
  const sorted=[...ids].sort((a,b)=>a-b);
  for(const set of ALL_SETS){
    if(set.tiles.length!==ids.length) continue;
    const ss=[...set.tiles].sort((a,b)=>a-b);
    if(sorted.every((v,i)=>v===ss[i])) return set.name;
  }
  return null;
}
function allGroupsMatch(hand){
  if(!hand||!hand.length) return false;
  const g=calcGroups(hand);
  return g.length>0&&g.every(x=>x.match);
}
function makeDivSlot(i, isGroupBoundary){
  const slot=document.createElement('div');
  slot.className='div-slot';
  const inner=document.createElement('div');
  inner.className=isGroupBoundary?'divider-active':'divider-hint';
  slot.appendChild(inner);
  slot.addEventListener('click',e=>{
    e.stopPropagation();
    if(dividers.has(i)) dividers.delete(i);
    else dividers.add(i);
    render();
  });
  return slot;
}

function btn(p,label,cls,fn){
  const b=document.createElement('button');b.className=`abtn ${cls}`;b.textContent=label;b.onclick=fn;p.appendChild(b);
}
